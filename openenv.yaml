name: invoice-processing-env
description: >
  OpenEnv-compliant Invoice & Receipt Processing Environment simulating real-world
  financial workflows: field extraction, expense categorization, and anomaly detection.
tags:
  - openenv
  - finance
  - invoice-processing

environment:
  entrypoint: env/environment.py::InvoiceEnv
  episode_definition: One episode is one batch of invoices.

tasks:
  - id: field_extraction
    name: Field Extraction
    title: Field Extraction
    difficulty: easy
    description: Extract vendor_name and invoice_date from invoice data.
    grader: env/graders.py::grade_extraction
    graders:
      - env/graders.py::grade_extraction
    grading: Exact match gets 0.99, fuzzy match above 0.8 gets partial credit, minimum 0.01.
    score_range:
      min_exclusive: 0.0
      max_exclusive: 1.0
      min_returned: 0.001
      max_returned: 0.99
  - id: expense_categorization
    name: Expense Categorization
    title: Expense Categorization
    difficulty: medium
    description: Classify into Travel, Office Supplies, Utilities, or Misc.
    grader: env/graders.py::grade_category
    graders:
      - env/graders.py::grade_category
    grading: Correct is 0.999, close guess is 0.8 (supports optional top-2 format), minimum 0.001.
    score_range:
      min_exclusive: 0.0
      max_exclusive: 1.0
      min_returned: 0.001
      max_returned: 0.999
  - id: anomaly_detection
    name: Anomaly Detection
    title: Anomaly Detection
    difficulty: hard
    description: Identify duplicate invoices and unusually high amounts.
    grader: env/graders.py::grade_anomaly
    graders:
      - env/graders.py::grade_anomaly
    grading: F1 score over anomaly detection predictions, minimum 0.001.
    score_range:
      min_exclusive: 0.0
      max_exclusive: 1.0
      min_returned: 0.001
      max_returned: 0.999
      min_returned: 0.001
      max_returned: 0.99

schemas:
  observation: env/models.py::InvoiceObservation
  action: env/models.py::InvoiceAction
  reward: env/models.py::InvoiceReward